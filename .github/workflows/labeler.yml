name: Label Issues

on:
  issues:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

      - name: Auto-label by keyword
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = context.payload.issue.body.toLowerCase();
            const text = title + body;
            
            const labels = [];
            if (text.includes('permission')) labels.push('permissions');
            if (text.includes('notification')) labels.push('notifications');
            if (text.includes('shizuku')) labels.push('shizuku');
            if (text.includes('bug')) labels.push('bug');
            if (text.includes('feature')) labels.push('enhancement');
            
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labels
              });
            }
